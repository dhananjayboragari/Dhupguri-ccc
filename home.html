<!DOCTYPE html>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Submission Page</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(135deg, #f0f0f0, #dcdcdc);
  color:#333;
}

.container{
  display:flex;
  flex-direction:column;
  gap:20px;
  max-width:360px;
  width:100%;
}

.card-box{
  position:relative;
}

.card-border{
  padding:1.5px;
  border-radius:20px;
  background: linear-gradient(90deg, #FF7F50, #FF6347);
  transition: transform 0.3s ease;
}

.card-border:hover{
  transform: scale(1.05);
}

.card-btn{
  background:white;
  border-radius:16px;
  padding:18px;
  text-align:center;
  cursor:pointer;
  box-shadow:0 6px 18px rgba(0,0,0,0.2);
  transition: transform 0.15s ease, box-shadow 0.15s ease;
}

.card-btn:active{
  transform: scale(0.95);
  box-shadow:0 2px 6px rgba(0,0,0,0.3);
}

.card-btn img{
  width:55px;
  margin-bottom:10px;
}

.card-btn h3{
  margin:0;
  font-size:15px;
}

.loader{
  width:0%;
  height:5px;
  border-radius:5px;
  margin-top:10px;
  background:linear-gradient(90deg,#00ffcc,#ff00ff,#00ffcc);
  animation:loaderFlash 1.2s linear infinite;
  transition: width 0.1s linear;
}

@keyframes loaderFlash{
  0%{background-position:0%}
  100%{background-position:200%}
}

a{text-decoration:none; color:black; display:block;}
</style>
</head>

<script>
function startLoad(e, el){
  e.preventDefault();
  let loader = el.querySelector(".loader");
  let width = 0;

  let iframe = document.createElement("iframe");
  iframe.src = el.href;
  iframe.style.display = "none";
  document.body.appendChild(iframe);

  let run = setInterval(()=>{
    if(width < 60) width += 0.8;
    else if(width < 85) width += 0.3;
    else if(width < 90) width += 0.15;
    else if(width < 95) width += 0.05;

    loader.style.width = width + "%";
  },120);

  iframe.onload = function(){
    clearInterval(run);
    loader.style.width = "100%";
    window.location.href = el.href;
    iframe.remove();
  }
}
</script>

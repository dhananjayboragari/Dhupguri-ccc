function startLoad(e, el){
  e.preventDefault();
  let loader = el.querySelector(".loader");
  let width = 0;

  let iframe = document.createElement("iframe");
  iframe.src = el.href;
  iframe.style.display = "none";
  document.body.appendChild(iframe);

  let run = setInterval(()=>{
    if(width < 60) width += 0.8;
    else if(width < 85) width += 0.3;
    else if(width < 90) width += 0.15;
    else if(width < 95) width += 0.05;

    loader.style.width = width + "%";
  },120);

  iframe.onload = function(){
    clearInterval(run);
    loader.style.width = "100%";
    window.location.href = el.href;
    iframe.remove();
  }
}
</script>

const firebaseConfig = {
  apiKey: "AIzaSyCZd10BUgRR9IEQ2kENQ_bXZiThegHRY-I",
  authDomain: "dhupguri-ccc.firebaseapp.com",
  projectId: "dhupguri-ccc",

  messagingSenderId: "278611213070",

};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let user = null;

// DEBUG
console.log("JS Loaded ✅");

onAuthStateChanged(auth, async (u) => {
  
resetTimer();
  const isLoggedIn = localStorage.getItem("loginSuccess");

  // 🔴 BLOCK (login ছাড়া ঢুকলে)
  if (!u || !isLoggedIn) {

  // ✅ USER OK

      const data = snap.data();

      // ✅ NAME SHOW
      document.getElementById("profileName").innerText =

      // ✅ IMAGE SHOW

        const img = document.getElementById("profileBtnImg");

        document.getElementById("profileBtnImg").style.display = "none";
        document.getElementById("profileIcon").style.display = "flex";
      }

      // ✅ PROFILE CHECK
      let missingFields = [];

      if (!data.name) missingFields.push("Name");
      if (!data.phone) missingFields.push("Phone");
      if (!data.address) missingFields.push("Address");
      if (!data.image) missingFields.push("Profile Photo");

      if (missingFields.length > 0) {
        setTimeout(() => openProfile(true, missingFields), 500);
      }

    } else {
      // নতুন user হলে
      setTimeout(() => openProfile(true), 500);
    }

  } catch (err) {
    console.log("Error:", err);
  }

});

window.showPopup = function(msg, type = "success", callback = null) {
  popupText.innerText = msg;

  const box = document.querySelector(".popupBox");
  const btn = box.querySelector("button");
  const icon = document.getElementById("popupIcon");

  icon.classList.remove("loadingAnim");

  if (type === "loading") {
    btn.style.display = "none";
    icon.innerText = "⏳";
    icon.classList.add("loadingAnim");
  } 
  else if (type === "error") {
    btn.style.display = "inline-block";
    icon.innerText = "❌";
  } 
  else {
    btn.style.display = "inline-block";
    icon.innerText = "✅";
  }

  box.dataset.callback = callback ? "true" : "";
  window.popupCallback = callback;

  customPopup.style.display = "flex";
};

const apiKey = "a5d421a5cbe17ebcfd2e0b90915c2501";

async function uploadToImgBB(file){
  return new Promise((resolve) => {

    const reader = new FileReader();

    reader.onload = async function(){
      const base64 = reader.result.split(',')[1];

      const formData = new FormData();
      formData.append("image", base64);

      try {
        const res = await fetch("https://api.imgbb.com/1/upload?key=" + apiKey, {
          method: "POST",
          body: formData
        });

        const data = await res.json();
        console.log("ImgBB response:", data);

        if(data.success){
          resolve(data.data.url);
        } else {
          showPopup("Upload failed ❌","error");
          resolve("");
        }

      } catch (err) {
        console.log(err);
        showPopup("Network error ❌","error");
        resolve("");
      }
    };

    reader.readAsDataURL(file);
  });
}





document.getElementById("profileImage").addEventListener("change", function(e){
  const file = e.target.files[0];

  if(file){
    const reader = new FileReader();

    reader.onload = function(){
      const img = document.getElementById("previewImg");
      img.src = reader.result;
      img.style.display = "block";
    }

    reader.readAsDataURL(file);
  }
});

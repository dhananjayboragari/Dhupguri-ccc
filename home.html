<style>
*{box-sizing:border-box;}

body{
  margin:0;
  font-family:Arial, sans-serif;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:flex-start; /* keeps buttons starting from top */
  padding:20px;
  color:#fff;

  /* Background Image */
  background: url("https://i.ibb.co/sdNSg0QZ/Amazing-Wallpapers-For-Phone.jpg") no-repeat center center fixed;
  background-size:cover;
}

/* Minimal overlay for slight contrast */
body::before{
  content:"";
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.05);
  z-index:-1;
}

.container{
  display:flex;
  flex-direction:column;
  gap:12px; 
  max-width:400px; 
  width:100%;
  margin:auto;
  margin-top:60px; /* pushed buttons lower on the page */
}

.card-box{
  position:relative;
}

.card-border{
  padding:1.5px;
  border-radius:20px;
  background: linear-gradient(90deg, #FF7F50, #FF6347);
  transition: transform 0.3s ease;
}

.card-border:hover{
  transform: scale(1.05);
}

/* Button styling */
.card-btn{
  background:#ffffff; /* pure white */
  border-radius:16px;
  padding:0 8px;
  width:100%;
  height:120px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  box-shadow:0 6px 18px rgba(0,0,0,0.25);
  transition: transform 0.15s ease, box-shadow 0.15s ease;
}

.card-btn:active{
  transform: scale(0.95);
  box-shadow:0 2px 6px rgba(0,0,0,0.3);
}

/* Icon fully inside button */
.card-btn img{
  max-width:70%;
  max-height:70%;
  object-fit:contain;
  margin-bottom:8px;
}

.card-btn h3{
  margin:0;
  font-size:16px;
  color:#222;
  text-align:center;
  word-break:break-word;
}

.loader{
  width:0%;
  height:5px;
  border-radius:5px;
  margin-top:6px;
  background:linear-gradient(90deg,#00ffcc,#ff00ff,#00ffcc);
  animation:loaderFlash 1.2s linear infinite;
  background-size:200%;
  transition: width 0.1s linear;
}

@keyframes loaderFlash{
  0%{background-position:0%}
  100%{background-position:200%}
}

a{
  text-decoration:none;
  color:black;
  display:block;
}

/* Responsive adjustments */
@media (max-width:768px){
  .card-btn{
    height:110px;
  }
  .card-btn img{
    max-width:60%;
    max-height:60%;
  }
  .card-btn h3{
    font-size:14px;
  }
}

@media (max-width:480px){
  .container{
    max-width:330px;
    gap:10px;
    
  }
  .card-btn{
    height:100px;
  }
  .card-btn img{
    max-width:65%;
    max-height:65%;
  }
  .card-btn h3{
    font-size:13px;
  }
}
</style>
</head>

<script>
function startLoad(e, el){
  e.preventDefault();
  let loader = el.querySelector(".loader");
  let width = 0;

  let iframe = document.createElement("iframe");
  iframe.src = el.href;
  iframe.style.display = "none";
  document.body.appendChild(iframe);

  let run = setInterval(()=>{
    if(width < 60) width += 0.8;
    else if(width < 85) width += 0.3;
    else if(width < 90) width += 0.15;
    else if(width < 95) width += 0.05;

    loader.style.width = width + "%";
  },120);

  iframe.onload = function(){
    clearInterval(run);
    loader.style.width = "100%";
    window.location.href = el.href;
    iframe.remove();
  }
}
</script>

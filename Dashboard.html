<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Admin Dashboard</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body{
  background: linear-gradient(135deg,#1d2671,#c33764);
  color:#fff;
  padding:20px;
}

/* Header */
h1{
  margin-bottom:20px;
}

/* Cards */
.cards{
  display:flex;
  gap:20px;
  flex-wrap:wrap;
}

.card{
  flex:1;
  min-width:220px;
  padding:20px;
  border-radius:15px;
  background:rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  text-align:center;
}

.card h2{
  font-size:28px;
}

/* Table */
.table-container{
  margin-top:20px;
  overflow-x:auto;
}

table{
  width:100%;
  border-collapse: collapse;
  background:rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  border-radius:10px;
  overflow:hidden;
}

th,td{
  padding:12px;
  text-align:left;
}

th{
  background:rgba(0,0,0,0.4);
}

tr{
  border-bottom:1px solid rgba(255,255,255,0.1);
}

tr:hover{
  background:rgba(255,255,255,0.08);
}

/* User Info */
.user{
  display:flex;
  align-items:center;
  gap:10px;
}

.user img{
  width:40px;
  height:40px;
  border-radius:50%;
  object-fit:cover;
  border:2px solid #fff;
}

/* Status */
.online{
  color:#00ff9d;
  font-weight:bold;
}

.offline{
  color:#ff4d4d;
  font-weight:bold;
}
</style>
</head>

<body>

<h1>🔥 Admin Dashboard</h1>

<div class="cards">
  <div class="card">
    <p>Total Users</p>
    <h2 id="total">0</h2>
  </div>

  <div class="card">
    <p>Online Users</p>
    <h2 id="online">0</h2>
  </div>
</div>

<div class="table-container">
<table>
<thead>
<tr>
<th>User</th>
<th>Email</th>
<th>Phone</th>
<th>Address</th>
<th>Status</th>
<th>Last Seen</th>
</tr>
</thead>

<tbody id="userTable"></tbody>
</table>
</div>

<script type="module">
import { initializeApp } from "https://gstatic.com";
import { getAuth, onAuthStateChanged } from "https://gstatic.com";
import { getFirestore, collection, onSnapshot, doc, updateDoc, serverTimestamp } from "https://gstatic.com";
import { getDatabase, ref, set, onDisconnect } from "https://gstatic.com";

const firebaseConfig = {
  apiKey: "AIzaSyCZd10BUgRR9IEQ2kENQ_bXZiThegHRY-I",
  authDomain: "://firebaseapp.com",
  projectId: "dhupguri-ccc",
  storageBucket: "dhupguri-ccc.firebasestorage.app",
  messagingSenderId: "278611213070",
  appId: "1:278611213070:web:f9652c7965f472164c355f"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();
const rtdb = getDatabase(app);

onAuthStateChanged(auth, async (user) => {
  if(!user){
    window.location.href="login.html";
    return;
  }

  // ✅ ১. অ্যাডমিন ইমেইল চেক
  const admins = [
    "dhananjayboragari@gmail.com",
    "chakrabortyelectricalsdhup@gmail.com"
  ];

  if(!admins.includes(user.email.toLowerCase())){
    alert("Access Denied ❌ আপনি অ্যাডমিন নন।");
    window.location.href="login.html";
    return;
  }

  // ✅ ২. অ্যাডমিন অনলাইন হলে Firestore আপডেট
  try {
    await updateDoc(doc(db, "users", user.uid), {
      isOnline: true
    });
  } catch(e) {
    console.log("Firestore আপডেট করা যায়নি, সম্ভবত Rules লক করা:", e);
  }

  // ✅ ৩. রিয়েলটাইম ডাটাবেস দিয়ে অ্যাপ ট্র্যাকিং (অ্যাপ বা ব্রাউজার ক্লোজ করলে অফলাইন করার জন্য)
  const statusRef = ref(rtdb, "status/" + user.uid);
  set(statusRef, {
    state: "online",
    lastChanged: Date.now()
  });

  onDisconnect(statusRef).set({
    state: "offline",
    lastChanged: Date.now()
  });

  // ব্রাউজার ট্যাব হঠাৎ কেটে দিলে সাথে সাথে অফলাইন মার্ক করার ব্যাকআপ নিয়ম
  window.addEventListener("pagehide", () => {
    if(user) {
      updateDoc(doc(db, "users", user.uid), {
        isOnline: false,
        lastLogout: serverTimestamp()
      });
    }
  });

  // ✅ ৪. লাইভ ডাটা লোড এবং টেবিল শো করা
  onSnapshot(collection(db, "users"), (snapshot) => {
    let total = snapshot.size;
    let online = 0;
    let html = "";

    snapshot.forEach(docSnap => {
      let d = docSnap.data();
      if(d.isOnline) online++;

      // টাইম ফরম্যাট ঠিক করা
      let lastSeenTime = "-";
      if(d.isOnline) {
        lastSeenTime = "Active Now";
      } else if(d.lastLogout) {
        let dateObj = d.lastLogout.seconds ? new Date(d.lastLogout.seconds * 1000) : new Date(d.lastLogout);
        if(!isNaN(dateObj)) {
          lastSeenTime = dateObj.toLocaleDateString("en-IN", { day: '2-digit', month: '2-digit', year: 'numeric' }) + 
                         " " + 
                         dateObj.toLocaleTimeString("en-IN", { hour: '2-digit', minute: '2-digit', hour12: true });
        }
      }

      html += `
      <tr>
        <td>
          <div class="user">
            <img src="${d.image || 'https://imgur.com'}" onerror="this.src='https://imgur.com'">
            <span>${d.name || "-"}</span>
          </div>
        </td>
        <td>${d.email || "-"}</td>
        <td>${d.phone || "-"}</td>
        <td>${d.address || "-"}</td>
        <td class="${d.isOnline ? 'online':'offline'}">
          ${d.isOnline ? "🟢 Online" : "🔴 Offline"}
        </td>
        <td>${lastSeenTime}</td>
      </tr>
      `;
    });

    document.getElementById("total").innerText = total;
    document.getElementById("online").innerText = online;
    document.getElementById("userTable").innerHTML = html;
  }, (error) => {
    console.error("ডাটাবেস থেকে তথ্য লোড করা যাচ্ছে না! এরর মেসেজ:", error);
    alert("ডাটা শো হচ্ছে না! অনুগ্রহ করে আপনার Firebase Firestore Rules চেক করুন।");
  });
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>User Dashboard</title>
  

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Segoe UI;
}

body{
  background: linear-gradient(135deg,#1d2671,#c33764);
  color:#fff;
  padding:20px;
}

/* Header */
h1{
  margin-bottom:20px;
}

/* Cards */
.cards{
  display:flex;
  gap:20px;
  flex-wrap:wrap;
}

.card{
  flex:1;
  min-width:220px;
  padding:20px;
  border-radius:15px;
  background:rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  text-align:center;
}

.card h2{
  font-size:28px;
}

/* Table */
.table-container{
  margin-top:20px;
  overflow-x:auto;
}

table{
  width:100%;
  border-collapse: collapse;
  background:rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  border-radius:10px;
  overflow:hidden;
}

th,td{
  padding:12px;
  text-align:left;
}
  td{
  white-space: normal;
}

th{
  background:rgba(0,0,0,0.4);
}

tr{
  border-bottom:1px solid rgba(255,255,255,0.1);
}

tr:hover{
  background:rgba(255,255,255,0.08);
}

/* User Info */
.user{
  display:flex;
  align-items:center;
  gap:10px;
}

.user img{
  width:40px;
  height:40px;
  border-radius:50%;
  object-fit:cover;
  border:2px solid #fff;
}

/* Status */
.online{
  color:#00ff9d;
  font-weight:bold;
}

.offline{
  color:#ff4d4d;
  font-weight:bold;
}




  /* Account Status */
.active-account{
  color:#00ff9d;
  font-weight:bold;
}

.deactive-account{
  color:#ff4d4d;
  font-weight:bold;
}

/* Action Button */
.action-btn{
  border:none;
  padding:6px 12px;
  border-radius:8px;
  color:#fff;
  cursor:pointer;
  font-size:13px;
}

.activate-btn{
  background:#28a745;
}

.deactivate-btn{
  background:#dc3545;
}


  /* ===== Premium Popup ===== */

.popup-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.55);
  backdrop-filter:blur(8px);
  display:flex;
  justify-content:center;
  align-items:center;
  opacity:0;
  visibility:hidden;
  transition:.3s;
  z-index:9999;
}

.popup-overlay.show{
  opacity:1;
  visibility:visible;
}

.popup-box{
  width:90%;
  max-width:360px;
  background:rgba(255,255,255,.12);
  backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,.2);
  border-radius:22px;
  padding:25px;
  text-align:center;
  animation:popupZoom .3s ease;
  box-shadow:0 15px 40px rgba(0,0,0,.35);
}

@keyframes popupZoom{
  from{
    transform:scale(.8);
    opacity:0;
  }
  to{
    transform:scale(1);
    opacity:1;
  }
}

.popup-icon{
  width:70px;
  height:70px;
  margin:auto;
  border-radius:50%;
  background:#ff9800;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:34px;
  margin-bottom:15px;
}

.popup-box h2{
  color:#fff;
  margin-bottom:10px;
}

.popup-box p{
  color:#ddd;
  margin-bottom:22px;
  line-height:1.5;
}

.popup-buttons{
  display:flex;
  gap:12px;
}

.popup-buttons button{
  flex:1;
  border:none;
  border-radius:12px;
  padding:12px;
  font-size:15px;
  font-weight:bold;
  cursor:pointer;
}

.cancel-btn{
  background:#555;
  color:#fff;
}


  .confirm-btn{
  background:linear-gradient(135deg,#ff512f,#dd2476);
  color:#fff;
  transition:.3s;
}


  .confirm-btn:hover{
  transform:translateY(-2px);
  box-shadow:0 10px 25px rgba(221,36,118,.45);
}

.cancel-btn:hover{
  background:#666;
}

  .popup-box{
  transition:0.3s;
}

.popup-overlay{
  transition:opacity .3s ease, visibility .3s ease;
}

.popup-overlay.show .popup-box{
  transform:scale(1);
}

.popup-overlay .popup-box{
  transform:scale(.8);
}



  .popup-icon{
  box-shadow:0 0 25px rgba(255,255,255,.35);
  animation:iconPulse 1.5s infinite;
}

@keyframes iconPulse{
  0%{
    transform:scale(1);
  }
  50%{
    transform:scale(1.1);
  }
  100%{
    transform:scale(1);
  }
}

  #popupImage{
  width:90px;
  height:90px;
  border-radius:50%;
  object-fit:cover;
  border:4px solid rgba(255,255,255,.8);
  margin:15px auto;
  display:block;
  box-shadow:0 8px 20px rgba(0,0,0,.35);
}

  @media (max-width:768px){

.cards{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:12px;
}

.card{
    min-width:0;
    padding:15px;
}

.card p{
    font-size:14px;
}

.card h2{
    font-size:24px;
}

}

  /* ===== Premium Role Badge ===== */

.role-badge{
display:inline-flex;
align-items:center;
justify-content:center;
gap:6px;
padding:8px 14px;
border-radius:50px;
font-size:13px;
font-weight:700;

letter-spacing:.4px;

color:#fff;

.role-user{

    border-radius: 50% !important;

</style>

  function formatTime(ts){
  if(!ts) return "-";

  let date;

  if(ts.toDate){
    date = ts.toDate();
  } else if(ts.seconds){
    date = new Date(ts.seconds * 1000);
  } else {
    date = new Date(ts);
  }

  if(isNaN(date.getTime())) return "-";

  let day = String(date.getDate()).padStart(2,'0');
  let month = String(date.getMonth()+1).padStart(2,'0');
  let year = date.getFullYear();

  let hours = date.getHours();
  let minutes = String(date.getMinutes()).padStart(2,'0');
  let seconds = String(date.getSeconds()).padStart(2,'0');

  let ampm = hours >= 12 ? "PM" : "AM";
  hours = hours % 12 || 12;

  hours = String(hours).padStart(2,'0');

  return `${day}/${month}/${year}<br>${hours}:${minutes}:${seconds} ${ampm}`;
}

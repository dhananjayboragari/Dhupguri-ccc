<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Premium Admin Dashboard</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Segoe UI;
}

body{
  background: linear-gradient(135deg,#1d2671,#c33764);
  color:#fff;
  padding:20px;
}

/* Header */
h1{
  margin-bottom:20px;
}

/* Cards */
.cards{
  display:flex;
  gap:20px;
  flex-wrap:wrap;
}

.card{
  flex:1;
  min-width:220px;
  padding:20px;
  border-radius:15px;
  background:rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  text-align:center;
}

.card h2{
  font-size:28px;
}

/* Table */
.table-container{
  margin-top:20px;
  overflow-x:auto;
}

table{
  width:100%;
  border-collapse: collapse;
  background:rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  border-radius:10px;
  overflow:hidden;
}

th,td{
  padding:12px;
  text-align:left;
}

th{
  background:rgba(0,0,0,0.4);
}

tr{
  border-bottom:1px solid rgba(255,255,255,0.1);
}

tr:hover{
  background:rgba(255,255,255,0.08);
}

/* User Info */
.user{
  display:flex;
  align-items:center;
  gap:10px;
}

.user img{
  width:40px;
  height:40px;
  border-radius:50%;
  object-fit:cover;
  border:2px solid #fff;
}

/* Status */
.online{
  color:#00ff9d;
  font-weight:bold;
}

.offline{
  color:#ff4d4d;
  font-weight:bold;
}

</style>
</head>

<body>

<h1>🔥 Admin Dashboard</h1>

<div class="cards">
  <div class="card">
    <p>Total Users</p>
    <h2 id="total">0</h2>
  </div>

  <div class="card">
    <p>Online Users</p>
    <h2 id="online">0</h2>
  </div>
</div>

<div class="table-container">
<table>
<thead>
<tr>
<th>User</th>
<th>Email</th>
<th>Phone</th>
<th>Address</th>
<th>Status</th>
<th>Last Seen</th>
</tr>
</thead>

<tbody id="userTable"></tbody>
</table>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, onSnapshot, doc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCZd10BUgRR9IEQ2kENQ_bXZiThegHRY-I",
  authDomain: "dhupguri-ccc.firebaseapp.com",
  projectId: "dhupguri-ccc",
  storageBucket: "dhupguri-ccc.firebasestorage.app",
  messagingSenderId: "278611213070",
  appId: "1:278611213070:web:f9652c7965f472164c355f"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

onAuthStateChanged(auth, async (user) => {

  if(!user){
    window.location.href="login.html";
    return;
  }

  // ✅ Admin check
  const admins = [
    "dhananjayboragari@gmail.com",
    "chakrabortyelectricalsdhup@gmail.com"
  ];

  if(!admins.includes(user.email)){
    alert("Access Denied ❌");
    window.location.href="login.html";
    return;
  }

  // ✅ Set admin online
  await updateDoc(doc(db,"users",user.uid),{
    isOnline:true
  });

  // 🔴 Tab close = offline
  window.addEventListener("beforeunload", async () => {
    await updateDoc(doc(db,"users",user.uid),{
      isOnline:false,
      lastLogout:serverTimestamp()
    });
  });

  // 🔥 LIVE DATA
  onSnapshot(collection(db,"users"), (snapshot)=>{

    let total = snapshot.size;
    let online = 0;
    let html = "";

    snapshot.forEach(docSnap=>{
      let d = docSnap.data();

      if(d.isOnline) online++;

      html += `
      <tr>
        <td>
          <div class="user">
            <img src="${d.image || 'https://i.imgur.com/HeIi0wU.png'}">
            <span>${d.name || "-"}</span>
          </div>
        </td>

        <td>${d.email || "-"}</td>
        <td>${d.phone || "-"}</td>
        <td>${d.address || "-"}</td>

        <td class="${d.isOnline ? 'online':'offline'}">
          ${d.isOnline ? "🟢 Online":"🔴 Offline"}
        </td>

        <td>
          ${d.isOnline 
            ? "Active Now" 
            : d.lastLogout 
              ? new Date(d.lastLogout.seconds * 1000).toLocaleString()
              : "-"
          }
        </td>
      </tr>
      `;
    });

    document.getElementById("total").innerText = total;
    document.getElementById("online").innerText = online;
    document.getElementById("userTable").innerHTML = html;

  });

});

</script>

</body>
</html>

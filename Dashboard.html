<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>User Dashboard</title>
  

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Segoe UI;
}

body{
  background: linear-gradient(135deg,#1d2671,#c33764);
  color:#fff;
  padding:20px;
}

/* Header */
h1{
  margin-bottom:20px;
}

/* Cards */
.cards{
  display:flex;
  gap:20px;
  flex-wrap:wrap;
}

.card{
  flex:1;
  min-width:220px;
  padding:20px;
  border-radius:15px;
  background:rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  text-align:center;
}

.card h2{
  font-size:28px;
}

/* Table */
.table-container{
  margin-top:20px;
  overflow-x:auto;
}

table{
  width:100%;
  border-collapse: collapse;
  background:rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  border-radius:10px;
  overflow:hidden;
}

th,td{
  padding:12px;
  text-align:left;
}
  td{
  white-space: normal;
}

th{
  background:rgba(0,0,0,0.4);
}

tr{
  border-bottom:1px solid rgba(255,255,255,0.1);
}

tr:hover{
  background:rgba(255,255,255,0.08);
}

/* User Info */
.user{
  display:flex;
  align-items:center;
  gap:10px;
}

.user img{
  width:40px;
  height:40px;
  border-radius:50%;
  object-fit:cover;
  border:2px solid #fff;
}

/* Status */
.online{
  color:#00ff9d;
  font-weight:bold;
}

.offline{
  color:#ff4d4d;
  font-weight:bold;
}




  /* Account Status */
.active-account{
  color:#00ff9d;
  font-weight:bold;
}

.deactive-account{
  color:#ff4d4d;
  font-weight:bold;
}

/* Action Button */
.action-btn{
  border:none;
  padding:6px 12px;
  border-radius:8px;
  color:#fff;
  cursor:pointer;
  font-size:13px;
}

.activate-btn{
  background:#28a745;
}

.deactivate-btn{
  background:#dc3545;
}

  
</style>
</head>

<body>

<h1>🔥 All User Dashboard</h1>

<div class="cards">
  <div class="card">
    <p>Total Users</p>
    <h2 id="total">0</h2>
  </div>

  <div class="card">
    <p>Online Users</p>
    <h2 id="online">0</h2>
  </div>
</div>

<div class="table-container">
<table>
<thead>
<tr>
<th>User</th>
<th>Email</th>
<th>Phone</th>
<th>Address</th>
<th>Status</th>
  <th>Account</th>
<th>Action</th>
<th>Last Login</th>
<th>Last Seen</th>
  
</tr>
</thead>

<tbody id="userTable"></tbody>
</table>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, onSnapshot, doc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  import { getDatabase, ref, onValue, set, onDisconnect } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  

const firebaseConfig = {
  apiKey: "AIzaSyCZd10BUgRR9IEQ2kENQ_bXZiThegHRY-I",
  authDomain: "dhupguri-ccc.firebaseapp.com",
  projectId: "dhupguri-ccc",
  storageBucket: "dhupguri-ccc.firebasestorage.app",
  messagingSenderId: "278611213070",
  appId: "1:278611213070:web:f9652c7965f472164c355f"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

  async function toggleAccount(uid, currentStatus){

  const deactivate = currentStatus === "active";

  const ok = confirm(
    deactivate
      ? "Are you sure you want to deactivate this account?"
      : "Are you sure you want to activate this account?"
  );

  if(!ok) return;

  await updateDoc(doc(db,"users",uid),{
    accountStatus: deactivate ? "deactivated" : "active"
  });

  alert(
    deactivate
      ? "✅ Account deactivated successfully."
      : "✅ Account activated successfully."
  );

}


  window.toggleAccount = toggleAccount;
  

const rtdb = getDatabase(app);

  function formatTime(ts){
  if(!ts) return "-";

  let date;

  if(ts.toDate){
    date = ts.toDate();
  } else if(ts.seconds){
    date = new Date(ts.seconds * 1000);
  } else {
    date = new Date(ts);
  }

  if(isNaN(date.getTime())) return "-";

  let day = String(date.getDate()).padStart(2,'0');
  let month = String(date.getMonth()+1).padStart(2,'0');
  let year = date.getFullYear();

  let hours = date.getHours();
  let minutes = String(date.getMinutes()).padStart(2,'0');
  let seconds = String(date.getSeconds()).padStart(2,'0');

  let ampm = hours >= 12 ? "PM" : "AM";
  hours = hours % 12 || 12;

  hours = String(hours).padStart(2,'0');

  return `${day}/${month}/${year}<br>${hours}:${minutes}:${seconds} ${ampm}`;
}

onAuthStateChanged(auth, async (user) => {

  
  if(!user){
    window.location.href="index.html";
    return;
  }

  // ✅ Admin check
  const admins = [
    "dhananjayboragari@gmail.com",
    "chakrabortyelectricalsdhup@gmail.com",
     "jedhupguri.wbsedcl@gmail.com",
  ];

  if(!admins.includes(user.email)){
    alert("Access Denied ❌");
    window.location.href="index.html";
    return;
  }

  // ✅ Firestore Online
  // ✅ Firestore Online + Login Time
await updateDoc(doc(db,"users",user.uid),{
  isOnline:true,
  lastLogin: serverTimestamp()   // ✅ ADD
});

  // 🔥 Realtime Presence START
  
  const statusRef = ref(rtdb, "status/" + user.uid);

  set(statusRef, {
    state: "online",
    lastChanged: Date.now()
  });

  onDisconnect(statusRef).set({
    state: "offline",
    lastChanged: Date.now()
  });

  
  onValue(statusRef, async (snap) => {
  const status = snap.val();

  if(status.state === "offline"){
    await updateDoc(doc(db,"users",user.uid),{
      isOnline:false,
      lastLogout: serverTimestamp(),   // ✅ logout time
      lastSeen: serverTimestamp()      // ✅ last seen
    });
  } else {
    await updateDoc(doc(db,"users",user.uid),{
      isOnline:true,
      lastSeen: serverTimestamp()      // ✅ active seen
    });
  }
});

  // 🔥 ADD THIS BELOW onValue block
window.addEventListener("beforeunload", async () => {
  if(auth.currentUser){
    await updateDoc(doc(db,"users",auth.currentUser.uid),{
      isOnline:false,
      lastLogout: serverTimestamp(),
      lastSeen: serverTimestamp()
    });
  }
});

  // 🔥 LIVE DATA
  let latestSnapshot = null;

  setInterval(()=>{
  if(latestSnapshot){

    let total = latestSnapshot.size;
    let online = 0;
    let html = "";

    latestSnapshot.forEach(docSnap=>{
      let d = docSnap.data();
      let isOnlineNow = false;

      if(d.lastSeen){
        let time;

        if(d.lastSeen.toDate){
          time = d.lastSeen.toDate().getTime();
        } else if(d.lastSeen.seconds){
          time = d.lastSeen.seconds * 1000;
        } else {
          time = new Date(d.lastSeen).getTime();
        }

        let diff = Date.now() - time;

        if(diff <= 120000){
          isOnlineNow = true;
        }
      }

      if(isOnlineNow) online++;

      html += `
      <tr>
        <td>
          <div class="user">
            <img src="${d.image || 'https://i.imgur.com/HeIi0wU.png'}">
            <span>${d.name || "-"}</span>
          </div>
        </td>

        <td>${d.email || "-"}</td>
        <td>${d.phone || "-"}</td>
        <td>${d.address || "-"}</td>

        <td class="${isOnlineNow ? 'online':'offline'}">
  ${isOnlineNow ? "🟢 Online":"🔴 Offline"}
</td>

<td class="${d.accountStatus === 'active' ? 'active-account':'deactive-account'}">
  ${d.accountStatus === "deactivated" ? "❌ Deactivated" : "✅ Active"}
</td>

<td>
  <button
    class="action-btn ${d.accountStatus === 'active' ? 'deactivate-btn':'activate-btn'}"
    onclick="toggleAccount('${docSnap.id}','${d.accountStatus || 'active'}')">

    ${d.accountStatus === "active" ? "Deactivate" : "Activate"}

  </button>
</td>

<td>${formatTime(d.lastLogin)}</td>
<td>${formatTime(d.lastSeen)}</td>
      </tr>
      `;
    });

    document.getElementById("total").innerText = total;
    document.getElementById("online").innerText = online;
    document.getElementById("userTable").innerHTML = html; // 🔥 MAIN FIX
  }
},10000);

  
  
  onSnapshot(collection(db,"users"), (snapshot)=>{
    latestSnapshot = snapshot;

    let total = snapshot.size;
    let online = 0;
    let html = "";

    snapshot.forEach(docSnap=>{
      let d = docSnap.data();
      let isOnlineNow = false;

if(d.lastSeen){
  let time;

  if(d.lastSeen.toDate){
    time = d.lastSeen.toDate().getTime();
  } else if(d.lastSeen.seconds){
    time = d.lastSeen.seconds * 1000;
  } else {
    time = new Date(d.lastSeen).getTime();
  }

  let diff = Date.now() - time;

  // ✅ 2 মিনিট = 120000 ms
  if(diff <= 120000){
    isOnlineNow = true;
  }
}

      if(isOnlineNow) online++;

      html += `
      <tr>
        <td>
          <div class="user">
            <img src="${d.image || 'https://i.imgur.com/HeIi0wU.png'}">
            <span>${d.name || "-"}</span>
          </div>
        </td>

        <td>${d.email || "-"}</td>
        <td>${d.phone || "-"}</td>
        <td>${d.address || "-"}</td>

        <td class="${isOnlineNow ? 'online':'offline'}">
  ${isOnlineNow ? "🟢 Online":"🔴 Offline"}
</td>

<td class="${d.accountStatus === 'active' ? 'active-account':'deactive-account'}">
  ${d.accountStatus === "deactivated" ? "❌ Deactivated" : "✅ Active"}
</td>

<td>
  <button
    class="action-btn ${d.accountStatus === 'active' ? 'deactivate-btn':'activate-btn'}"
    onclick="toggleAccount('${docSnap.id}','${d.accountStatus || 'active'}')">

    ${d.accountStatus === "active" ? "Deactivate" : "Activate"}

  </button>
</td>

<td>${formatTime(d.lastLogin)}</td>
<td>${formatTime(d.lastSeen)}</td>


      </tr>
      `;
    });

    
    document.getElementById("total").innerText = total;
    document.getElementById("online").innerText = online;
    document.getElementById("userTable").innerHTML = html;

  });

});

</script>

</body>
</html>

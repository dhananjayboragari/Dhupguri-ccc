<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  apiKey:"AIzaSyCZd10BUgRR9IEQ2kENQ_bXZiThegHRY-I",

  storageBucket:"dhupguri-ccc.firebasestorage.app",
  messagingSenderId:"278611213070",
  appId:"1:278611213070:web:f9652c7965f472164c355f"
};

const app=initializeApp(firebaseConfig);
const auth=getAuth();

// 🔥 RESET FUNCTION (same)
window.reset=function(){

let email=document.getElementById("email").value.trim();
let msg=document.getElementById("msg");
let btn=document.getElementById("btn");

if(email===""){
  msg.innerHTML="❌ Please enter email";
  msg.className="msg error";
  return;
}


  let captchaInput = document.getElementById("captchaInput").value;

if(parseInt(captchaInput) !== getAnswer()){
  msg.innerHTML="❌ Wrong CAPTCHA";
  msg.className="msg error";
  generateCaptcha();
  return;
}
  
btn.classList.add("loading");
msg.innerHTML="⏳ Sending reset link...";

sendPasswordResetEmail(auth,email)
.then(()=>{
  msg.innerHTML="✅ Reset link sent! Check your inbox or Spam folder for the Created new password";
  msg.className="msg success";
})
.catch(e=>{
  console.log(e);
  msg.innerHTML="❌ "+e.message;
  msg.className="msg error";
})
.finally(()=>{
  btn.classList.remove("loading");
});

}
</script>

  <script>
let num1, num2, operator;

function generateCaptcha(){
  const ops = ["+", "-", "×"];

  num1 = Math.floor(Math.random()*10)+1;
  num2 = Math.floor(Math.random()*10)+1;
  operator = ops[Math.floor(Math.random()*ops.length)];

  document.getElementById("captchaText").innerText =
    num1 + " " + operator + " " + num2 + " = ?";
}

function getAnswer(){
  if(operator === "+") return num1 + num2;
  if(operator === "-") return num1 - num2;
  if(operator === "×") return num1 * num2;
}

window.addEventListener("load", generateCaptcha);
</script>

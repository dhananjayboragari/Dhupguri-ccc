<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dhupguri ccc Login</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background:linear-gradient(135deg,#e0eafc,#cfdef3);

  display:flex;
  justify-content:center;

  align-items:flex-start; /* 🔥 CHANGE */
  min-height:100vh;

  padding:20px 0;
}
.card{
  display:flex;
  flex-direction:column;
  align-items:center;
  background: rgba(255,255,255,0.55);
  backdrop-filter: blur(10px);
  padding:30px 25px 40px;
  width:90%;
  max-width:360px;
  border-radius:20px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.1);
  text-align:center;
}
.icon-box{
  width:80px;height:80px;
  background:#007bff;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  margin:0 auto 15px;
}
.icon-box i{color:#fff;font-size:32px;}
.company{
  color:#007bff;
  font-weight:600;
  margin-bottom:15px;
  font-size:18px;
}
.input-box{
  position:relative;
  width:100%;
  margin:10px 0;
}
.left,.right{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  color:#888;
}
.left{ left:12px; }
.right{ right:12px; cursor:pointer; }
input{
  width:100%;
  padding:14px 45px;
  border:1px solid #ccc;
  border-radius:12px;
  outline:none;
  font-size:15px;
}
input:focus{
  border-color:#007bff;
  box-shadow:0 0 5px rgba(0,123,255,0.2);
}
button{
  width:100%;
  padding:14px;
  background:#007bff;
  color:#fff;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-size:16px;
  margin-top:12px;
}
button:hover{ background:#0056b3; }

.msg{
  margin-top:12px;
  font-size:14px;
  min-height:18px;
}
.success{color:green;}
.error{color:red;}

.remember{
  display:flex;
  align-items:center;
  font-size:14px;
  margin-top:12px;
}
.remember input{
  width:16px;
  height:16px;
  margin-right:8px;
}

.link{
  display:block;
  margin-top:12px;
  color:#007bff;
  cursor:pointer;
  font-size:14px;
  text-decoration:underline;
}

#resend{
  display:none;
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:12px;
  background:#ffc107;
  color:#fff;
  cursor:pointer;
}
#resend:hover{background:#e0a800;}

h2{ margin:5px 0 10px; }

/* CAPS WARNING */
#caps{
  font-size:12px;
  color:#dc3545;
  display:none;
}

/* POPUP */
.popup{
  position:fixed;
  top:120px;
  left:50%;
  transform:translateX(-50%) translateY(-20px);
  background:#333;
  color:#fff;
  padding:15px 22px;
  border-radius:12px;
  font-size:14px;
  opacity:0;
  transition:all 0.4s ease;
  z-index:9999;
}
.popup.show{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}
.popup.success{ background:#28a745; }
.popup.error{ background:#dc3545; }
.popup.waiting{ background:#007bff; }

.popup.waiting::after{
  content:"";
  display:inline-block;
  width:14px;
  height:14px;
  margin-left:8px;
  border:2px solid #fff;
  border-top:2px solid transparent;
  border-radius:50%;
  animation:spin 0.7s linear infinite;
}
@keyframes spin{
  to{ transform:rotate(360deg); }
}



/* TOGGLE BUTTON */
.toggle-more{
  margin-top:10px;
  font-size:18px;
  cursor:pointer;
  color:#007bff;
  transition:0.3s;
  text-align:center;
}

/* rotate */
.toggle-more.active{
  transform:rotate(180deg);
}

/* HIDDEN AREA */
.extra{
  max-height:0;
  overflow:hidden;
  transition:0.4s ease;
}

/* OPEN */
.extra.open{
  max-height:1000px;
}

/* LINKS */
  
.social{
  margin-top:15px;
  margin-bottom:25px;
  display:flex;
  justify-content:center;
  gap:15px;
}

.social a{
  text-decoration:none;
}

.social i{
  width:50px;
  height:50px;
  line-height:50px;
  border-radius:50%;
  color:#fff;
  text-align:center;
  font-size:18px;
  cursor:pointer;

  box-shadow:0 5px 15px rgba(0,0,0,0.2);
  transition:all 0.3s ease;
}

.social i:hover{
  transform:translateY(-5px) scale(1.1);
  box-shadow:0 8px 20px rgba(0,0,0,0.3);
}

.fa-facebook-f{
  background:linear-gradient(45deg,#1877f2,#3b82f6);
}
.fa-google{
  background:linear-gradient(45deg,#db4437,#ff6a00);
}
.fa-instagram{
  background:linear-gradient(45deg,#e1306c,#fd1d1d,#fcb045);
}
.fa-whatsapp{
  background:linear-gradient(45deg,#25d366,#128c7e);
}



.link-row{
  display:flex;
  flex-direction:column;
  gap:20px;
  width:100%;
}

/* BOX STYLE */
.link-box{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  padding:12px;
  border-radius:14px;

  /* 🔥 GLASS BLUR */
  background: rgba(255,255,255,0.25);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);

  border:1px solid rgba(255,255,255,0.3);

  cursor:pointer;
  font-size:14px;
  transition:all 0.3s ease;
}

/* ICON */
.link-box i{
  color:#007bff;
  font-size:16px;
  transition:0.3s;
}

/* HOVER EFFECT */
.link-box:hover{
  background:linear-gradient(45deg,#007bff,#00c6ff);
  color:#fff;
  transform:translateY(-4px) scale(1.03);
  box-shadow:0 10px 20px rgba(0,123,255,0.3);
}

.link-box:hover i{
  color:#fff;
}

/* CLICK EFFECT */
.link-box:active{
  transform:scale(0.96);
}
  
         
</style>
</head>

<body>

<div class="card">
  <div class="icon-box">
    <i class="fas fa-user"></i>
  </div>

  <div class="company">DHUPGURI C.C.C</div>

  <h2>Login</h2>

  <div class="input-box">
    <i class="fas fa-envelope left"></i>
    <input id="email" placeholder="Email">
  </div>

  <div class="input-box">
    <i class="fas fa-lock left"></i>
    <input id="password" type="password" placeholder="Password" onkeyup="checkCaps(event)">
    <i class="fas fa-eye right" onclick="togglePassword()"></i>
  </div>

  <div id="caps">⚠ Caps Lock is ON</div>

  <div class="remember">
    <input type="checkbox" id="remember"> Remember Me
  </div>

  <button onclick="login()">Login</button>

  <button id="resend" onclick="resendEmail()">Resend Verification Email</button>

  <div id="msg" class="msg"></div>

  
  <div class="toggle-more" onclick="toggleMore()">
  <i class="fas fa-chevron-down"></i>
</div>

<div class="extra" id="extra">

  <br>

<div class="link-row">

  <div class="link-box" onclick="location.href='signup.html'">
    <i class="fas fa-user-plus"></i>
    <span>Create Account</span>
  </div>

  <div class="link-box" onclick="location.href='forgot.html'">
    <i class="fas fa-key"></i>
    <span>Forgot Password</span>
  </div>

</div>
  
  <br>
<div class="social">

  <a href="https://facebook.com" target="_blank">
    <i class="fab fa-facebook-f"></i>
  </a>

  <a href="https://google.com" target="_blank">
    <i class="fab fa-google"></i>
  </a>

  <a href="https://instagram.com" target="_blank">
    <i class="fab fa-instagram"></i>
  </a>

  <a href="https://wa.me/6294746617" target="_blank">
    <i class="fab fa-whatsapp"></i>
  </a>

</div>

  
</div>
</div>

<div id="popup" class="popup"></div>

<script>
function togglePassword(){
  let p=document.getElementById("password");
  let icon=document.querySelector(".right");
  if(p.type==="password"){
    p.type="text";
    icon.classList.replace("fa-eye","fa-eye-slash");
  }else{
    p.type="password";
    icon.classList.replace("fa-eye-slash","fa-eye");
  }
}

function toggleMore(){
  const extra = document.getElementById("extra");
  const btn = document.querySelector(".toggle-more");

  extra.classList.toggle("open");
  btn.classList.toggle("active");
}
  
function checkCaps(e){
  const caps = document.getElementById("caps");
  if(e.getModifierState("CapsLock")){
    caps.style.display="block";
  }else{
    caps.style.display="none";
  }
}

window.onload = function(){
  let savedEmail = localStorage.getItem("rememberEmail");

  if(savedEmail){
    document.getElementById("email").value = savedEmail;
    document.getElementById("remember").checked = true;
    document.getElementById("password").focus(); // 🔥 auto focus
  }

  document.addEventListener("keydown", function(e){
    if(e.key==="Enter"){ login(); }
  });
}
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, sendEmailVerification } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const app = initializeApp({
  apiKey: "AIzaSyCZd10BUgRR9IEQ2kENQ_bXZiThegHRY-I",
  authDomain: "dhupguri-ccc.firebaseapp.com",
  projectId: "dhupguri-ccc",
  storageBucket: "dhupguri-ccc.firebasestorage.app",
  messagingSenderId: "278611213070",
  appId: "1:278611213070:web:f9652c7965f472164c355f"
});

const auth = getAuth();

let currentUser=null;
let timerInterval=null;
let popupTimeout;

function showPopup(message,type="success"){
  const popup = document.getElementById("popup");
  clearTimeout(popupTimeout);

  if(popup.classList.contains("show")){
    popup.classList.remove("show");
    setTimeout(()=>{
      popup.innerText = message;
      popup.className = "popup show " + type;
    },200);
  }else{
    popup.innerText = message;
    popup.className = "popup show " + type;
  }

  if(type!=="waiting"){
    popupTimeout = setTimeout(()=>{
      popup.classList.remove("show");
    },10000);
  }
}

window.login = async function(){
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;
  let msg = document.getElementById("msg");
  const resendBtn = document.getElementById("resend");

  msg.innerHTML="⏳ Logging in...";
  msg.style.color="#000";
  resendBtn.style.display="none";

  try{
    const userCredential = await signInWithEmailAndPassword(auth,email,password);
    currentUser = userCredential.user;

    if(!currentUser.emailVerified){
      msg.innerHTML="❌ Please verify your email first! Didn't receive? Click Resend.";
      msg.style.color="red";
      resendBtn.style.display="block";
      return;
    }

    // 🔥 remember email only
    if(document.getElementById("remember").checked){
      localStorage.setItem("rememberEmail", email);
    }else{
      localStorage.removeItem("rememberEmail");
    }

    msg.innerHTML="✅ Login Success";
msg.style.color="green";

// 🔥 IMPORTANT
localStorage.setItem("loginSuccess", "true");

// redirect
setTimeout(()=>{
  window.location.href = "home.html";
},1000);

  }catch(e){
    let customMsg = "Login failed. Please try again.";

    switch(e.code){
      case "auth/invalid-email":
        customMsg="Invalid email address."; break;
      case "auth/user-not-found":
        customMsg="This email is not registered. Please create a new account to continue."; break;
      case "auth/wrong-password":
        customMsg="Wrong password."; break;
      case "auth/too-many-requests":
        customMsg="Too many tries. Please wait 2 hours before trying again."; break;
      case "auth/network-request-failed":
       customMsg="Unable to connect to the server. Please check your internet or try again later."; break;
      case "auth/invalid-credential":
        customMsg="Email or password incorrect."; break;
    }

    msg.innerHTML="❌ "+customMsg;
    msg.style.color="red";
  }
}

function startCooldown(btn,timeLeft=60){
  btn.disabled=true;

  timerInterval=setInterval(()=>{
    btn.innerText=`Resend in ${timeLeft}s`;
    timeLeft--;

    if(timeLeft<0){
      clearInterval(timerInterval);
      btn.disabled=false;
      btn.innerText="Resend Verification Email";
      localStorage.removeItem("resendTime");
    }
  },1000);
}

window.resendEmail = async function(){
  const resendBtn = document.getElementById("resend");

  if(currentUser){
    try{
      showPopup("Sending email...","waiting");

      await sendEmailVerification(currentUser);

      showPopup("Verification email resent!","success");

      localStorage.setItem("resendTime",Date.now());
      startCooldown(resendBtn,60);

    }catch(e){
      showPopup("Failed to resend email","error");
    }
  }else{
    showPopup("Login again first","error");
  }
}




  
</script>

</body>
</html>
